name: Test Packages

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  detect-changed-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      count: ${{ steps.detect.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect changed packages
        id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python .github/scripts/detect_changed_packages.py

  test-uipath-core:
    name: Test (uipath-core, ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: detect-changed-packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check if package changed
        id: check
        shell: bash
        run: |
          if echo '${{ needs.detect-changed-packages.outputs.packages }}' | jq -e 'index("uipath-core")' > /dev/null; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip
        if: steps.check.outputs.skip == 'true'
        shell: bash
        run: echo "Skipping - no changes to uipath-core"

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: steps.check.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/uipath-core
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run tests
        if: steps.check.outputs.skip != 'true' && !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13')
        working-directory: packages/uipath-core
        run: uv run pytest

      - name: Run tests with coverage
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        working-directory: packages/uipath-core
        run: uv run pytest --cov-report=xml --cov-report=html --tb=short

      - name: Upload coverage HTML report
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-uipath-core
          path: packages/uipath-core/htmlcov/
          retention-days: 30

      - name: Upload coverage XML report
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-uipath-core
          path: packages/uipath-core/coverage.xml
          retention-days: 30

  test-uipath-platform:
    name: Test (uipath-platform, ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: detect-changed-packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check if package changed
        id: check
        shell: bash
        run: |
          if echo '${{ needs.detect-changed-packages.outputs.packages }}' | jq -e 'index("uipath-platform")' > /dev/null; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip
        if: steps.check.outputs.skip == 'true'
        shell: bash
        run: echo "Skipping - no changes to uipath-platform"

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: steps.check.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/uipath-platform
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run tests
        if: steps.check.outputs.skip != 'true' && !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13')
        working-directory: packages/uipath-platform
        run: uv run pytest

      - name: Run tests with coverage
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        working-directory: packages/uipath-platform
        run: uv run pytest --cov-report=xml --cov-report=html --tb=short

      - name: Upload coverage HTML report
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-uipath-platform
          path: packages/uipath-platform/htmlcov/
          retention-days: 30

      - name: Upload coverage XML report
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-uipath-platform
          path: packages/uipath-platform/coverage.xml
          retention-days: 30

  e2e-uipath-platform:
    name: E2E (uipath-platform, memory)
    needs: detect-changed-packages
    runs-on: ubuntu-latest
    steps:
      - name: Check if package changed
        id: check
        shell: bash
        run: |
          if echo '${{ needs.detect-changed-packages.outputs.packages }}' | jq -e 'index("uipath-platform")' > /dev/null; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip
        if: steps.check.outputs.skip == 'true'
        shell: bash
        run: echo "Skipping - no changes to uipath-platform"

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: steps.check.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/uipath-platform
        run: uv sync --all-extras --python 3.11

      - name: Run E2E memory tests
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/uipath-platform
        env:
          UIPATH_URL: ${{ secrets.ALPHA_BASE_URL }}
          UIPATH_CLIENT_ID: ${{ secrets.ALPHA_TEST_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.ALPHA_TEST_CLIENT_SECRET }}
          UIPATH_FOLDER_KEY: ${{ secrets.UIPATH_MEMORY_FOLDER }}
        run: uv run pytest tests/services/test_memory_service_e2e.py -m e2e -v --no-cov

  test-uipath:
    name: Test (uipath, ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: detect-changed-packages
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check if package changed
        id: check
        shell: bash
        run: |
          if echo '${{ needs.detect-changed-packages.outputs.packages }}' | jq -e 'index("uipath")' > /dev/null; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip
        if: steps.check.outputs.skip == 'true'
        shell: bash
        run: echo "Skipping - no changes to uipath"

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: steps.check.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/uipath
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run tests
        if: steps.check.outputs.skip != 'true' && !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13')
        working-directory: packages/uipath
        run: uv run pytest

      - name: Run tests with coverage
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        working-directory: packages/uipath
        run: uv run pytest --cov-report=xml --cov-report=html --tb=short

      - name: Upload coverage HTML report
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-uipath
          path: packages/uipath/htmlcov/
          retention-days: 30

      - name: Upload coverage XML report
        if: steps.check.outputs.skip != 'true' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-uipath
          path: packages/uipath/coverage.xml
          retention-days: 30

    continue-on-error: true

  sonarcloud:
    name: SonarCloud
    needs: [test-uipath-core, test-uipath-platform, test-uipath]
    runs-on: ubuntu-latest
    if: always() && needs.test-uipath-core.result != 'failure' && needs.test-uipath-platform.result != 'failure' && needs.test-uipath.result != 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download uipath-core coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-xml-uipath-core
          path: packages/uipath-core

      - name: Download uipath-platform coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-xml-uipath-platform
          path: packages/uipath-platform

      - name: Download uipath coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-xml-uipath
          path: packages/uipath

      - name: Rewrite coverage XML <source> to repo-relative paths
        run: |
          sed -i 's|<source>src</source>|<source>packages/uipath-core/src</source>|g' packages/uipath-core/coverage.xml || true
          sed -i 's|<source>src</source>|<source>packages/uipath-platform/src</source>|g' packages/uipath-platform/coverage.xml || true
          sed -i 's|<source>src</source>|<source>packages/uipath/src</source>|g' packages/uipath/coverage.xml || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-gate:
    name: Test
    needs: [test-uipath-core, test-uipath-platform, test-uipath, e2e-uipath-platform]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test-uipath-core.result }}" == "failure" || \
                "${{ needs.test-uipath-platform.result }}" == "failure" || \
                "${{ needs.test-uipath.result }}" == "failure" ]]; then
            echo "Tests failed"
            exit 1
          fi
          # E2E tests are informational — log but don't block
          if [[ "${{ needs.e2e-uipath-platform.result }}" == "failure" ]]; then
            echo "⚠️ E2E memory tests failed (non-blocking)"
          fi
          echo "All tests passed"
